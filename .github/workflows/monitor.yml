# ─────────────────────────────────────────────────────────────────
# Reuters Japan 中東情勢モニター - GitHub Actions ワークフロー
#
# トリガー: repository_dispatch（cron-job.org から HTTP POST で起動）
# 手動実行: workflow_dispatch（テスト・デバッグ用）
#
# ⚠️ Public リポジトリ対応済み
#   - DISCORD_WEBHOOK_URL は Secrets に格納（コードに直書き厳禁）
#   - permissions: contents: write で GITHUB_TOKEN に書き込み権限を明示付与
#   - PAT（Personal Access Token）はリポジトリ管理外（cron-job.org 側のみで保持）
# ─────────────────────────────────────────────────────────────────

name: Reuters Japan Middle East Monitor

on:
  repository_dispatch:
    types:
      - run-reuters-monitor
  workflow_dispatch:

concurrency:
  group: reuters-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Fetch & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/monitor.py

      # pending.json と sent.json を両方コミット
      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/pending.json data/sent.json

          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
            exit 0
          fi

          git commit -m "chore: update pending.json / sent.json [skip ci]"
          git push
